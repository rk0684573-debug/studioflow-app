<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudioFlow.ai // Ultimate AI Production Suite</title>
    <style>
        :root {
            --bg-black: #030306;
            --panel-glass: rgba(255, 255, 255, 0.02);
            --border-glow: rgba(255, 255, 255, 0.06);
            --neon-pink: #ff007f;
            --neon-cyan: #00f2fe;
            --neon-green: #4ece3d;
            --text-glow: 0 0 10px rgba(0, 242, 254, 0.5);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: radial-gradient(circle at 50% 50%, #120929 0%, var(--bg-black) 100%); color: #fff; overflow: hidden; height: 100vh; }
        
        #launch-intro { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; animation: fadeAwayIntro 2.5s forwards ease-in-out; }
        .intro-brand { font-size: 48px; font-weight: 900; letter-spacing: 8px; background: linear-gradient(45deg, var(--neon-cyan), var(--neon-pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: glowCycle 2s infinite alternate; }
        .intro-sub { color: #555975; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; margin-top: 8px; }
        .loading-bar-frame { width: 280px; height: 2px; background: rgba(255,255,255,0.05); margin-top: 35px; border-radius: 4px; overflow: hidden; position: relative; }
        .loading-bar-fill { width: 0%; height: 100%; background: var(--neon-cyan); box-shadow: 0 0 15px var(--neon-cyan); animation: fillPipeline 2.5s forwards linear; }
        
        @keyframes glowCycle { 0% { filter: drop-shadow(0 0 8px rgba(0,242,254,0.3)); transform: scale(0.99); } 100% { filter: drop-shadow(0 0 25px rgba(255,0,127,0.7)); transform: scale(1.01); } }
        @keyframes fillPipeline { 100% { width: 100%; } }
        @keyframes fadeAwayIntro { 85% { opacity: 1; visibility: visible; } 100% { opacity: 0; visibility: hidden; pointer-events: none; } }
        
        .master-app-wrapper { display: flex; flex-direction: column; height: 100vh; position: relative; z-index: 1; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 14px 30px; background: rgba(0, 0, 0, 0.7); border-bottom: 1px solid var(--border-glow); backdrop-filter: blur(15px); }
        .brand-node { font-weight: 900; font-size: 22px; background: linear-gradient(45deg, var(--neon-cyan), var(--neon-pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 1px; }
        .system-status { display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: bold; color: var(--neon-green); letter-spacing: 1px; text-transform: uppercase; }
        .status-dot { width: 6px; height: 6px; background: var(--neon-green); border-radius: 50%; box-shadow: 0 0 8px var(--neon-green); }
        
        .workspace-grid { display: grid; grid-template-columns: 380px 1fr; height: calc(100vh - 180px); }
        .console-sidebar { background: rgba(0,0,0,0.4); border-right: 1px solid var(--border-glow); padding: 25px; overflow-y: auto; }
        .section-label { font-size: 11px; font-weight: 700; color: var(--neon-cyan); text-transform: uppercase; margin-bottom: 8px; display: block; letter-spacing: 1.5px; text-shadow: var(--text-glow); }
        
        textarea, select, input { width: 100%; background: rgba(0, 0, 0, 0.7); color: #fff; border: 1px solid var(--border-glow); border-radius: 12px; padding: 14px; font-size: 14px; outline: none; margin-bottom: 22px; transition: all 0.3s ease; }
        textarea { height: 95px; resize: none; }
        
        .btn-compile { width: 100%; background: linear-gradient(45deg, var(--neon-pink), #7928ca); color: #fff; border: none; padding: 16px; font-size: 14px; font-weight: 800; border-radius: 12px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; box-shadow: 0 0 20px rgba(255,0,127,0.3); transition: all 0.3s ease; }
        .viewer-viewport-pane { display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.15); padding: 25px; position: relative; }
        .monitor-box-frame { width: 100%; max-width: 680px; aspect-ratio: 16/9; background: #000; border: 1px solid var(--border-glow); border-radius: 20px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        
        video { width: 100%; height: 100%; object-fit: cover; display: none; }
        .viewport-placeholder { height: 100%; display: flex; align-items: center; justify-content: center; color: #4e5266; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; font-weight: 500; text-align: center; padding: 20px; }
        
        .timeline-dock-bar { height: 125px; background: #05050b; border-top: 1px solid var(--border-glow); padding: 10px 30px; display: flex; flex-direction: column; gap: 8px; }
        .timeline-toolbar { display: flex; gap: 15px; align-items: center; font-size: 12px; color: #666e8a; }
        .action-tool-btn { background: rgba(255,255,255,0.03); border: 1px solid var(--border-glow); color: #fff; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 700; transition: 0.2s; }
        
        .tracks-layer-matrix { flex: 1; display: flex; flex-direction: column; gap: 5px; background: rgba(0,0,0,0.4); border-radius: 10px; padding: 5px; }
        .track-row-strip { display: flex; align-items: center; background: rgba(255,255,255,0.01); border-radius: 6px; height: 32px; }
        .track-meta-label { width: 85px; font-size: 10px; font-weight: 800; color: #555975; text-transform: uppercase; padding-left: 10px; letter-spacing: 1px; }
        .track-droppable-lane { flex: 1; height: 100%; background: rgba(0,0,0,0.4); position: relative; border-left: 1px solid rgba(255,255,255,0.04); }
        
        .timeline-clip-block { position: absolute; left: 4%; width: 70%; height: 84%; top: 8%; border-radius: 6px; display: flex; align-items: center; justify-content: space-between; padding: 0 12px; font-size: 11px; font-weight: 700; color: #000; }
        .v-clip-theme { background: linear-gradient(90deg, var(--neon-cyan), #0055ff); }
        .a-clip-theme { background: linear-gradient(90deg, var(--neon-pink), #7928ca); }
    </style>
</head>
<body>
    <div id="launch-intro"><div class="intro-brand">STUDIOFLOW.AI</div><div class="intro-sub">Booting Production Engine...</div><div class="loading-bar-frame"><div class="loading-bar-fill"></div></div></div>
    <div class="master-app-wrapper" id="app-viewport">
        <nav><div class="brand-node">STUDIOFLOW.AI</div><div class="system-status"><span class="status-dot"></span>Global Node Online</div></nav>
        <div class="workspace-grid">
            <div class="console-sidebar">
                <label class="section-label">01 // Write Script For Movie or Reels</label>
                <textarea id="prompt-script-box" placeholder="Enter content plot prompt here..."></textarea>
                <label class="section-label">02 // Target Deepfake AI Singer Model</label>
                <select id="vocal-profile-node"><option>Shreya Ghoshal AI [Vocal Clone v4]</option></select>
                <button class="btn-compile" onclick="executeLocalDemo()">⚡ Compile Video & Singing Track</button>
            </div>
            <div class="viewer-viewport-pane">
                <div class="monitor-box-frame">
                    <div class="viewport-placeholder" id="placeholder-text-node">Awaiting Timeline Stream</div>
                    <video id="master-live-player" controls loop></video>
                </div>
            </div>
        </div>
        <div class="timeline-dock-bar">
            <div class="timeline-toolbar"><span>🎛️ Unified Pro Editing Timeline</span></div>
            <div class="tracks-layer-matrix">
                <div class="track-row-strip"><div class="track-meta-label">Video Lane</div><div class="track-droppable-lane"><div class="timeline-clip-block v-clip-theme" id="v-block" style="display: none;"><span>AI_Render_Output.mp4</span></div></div></div>
                <div class="track-row-strip"><div class="track-meta-label">Audio Lane</div><div class="track-droppable-lane"><div class="timeline-clip-block a-clip-theme" id="a-block" style="display: none;"><span>AI_Vocal_Track.mp3</span></div></div></div>
            </div>
        </div>
    </div>
    <script>
        function executeLocalDemo() {
            const scriptVal = document.getElementById('prompt-script-box').value;
            if(!scriptVal) return alert("Please enter script first!");
            document.getElementById('v-block').style.display = 'flex';
            document.getElementById('a-block').style.display = 'flex';
            document.getElementById('placeholder-text-node').style.display = 'none';
            const mainPlayer = document.getElementById('master-live-player');
            mainPlayer.style.display = 'block';
            mainPlayer.src = "https://mixkit.co";
            mainPlayer.play();
        }
    </script>
</body>
</html>
